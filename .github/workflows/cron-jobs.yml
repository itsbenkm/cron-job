name: Fashionbroda Daily Cron Job

on:
  schedule:
    # Set your desired time here in UTC — format: minute hour day month weekday
    # Example below runs at 2:00 AM UTC daily — change to your preferred time
    - cron: "0 2 * * *"
  # Allows you to trigger the workflow manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  fashionbroda-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hour timeout to account for large image migrations

    defaults:
      run:
        # All steps run from the project root so package imports resolve correctly
        working-directory: fashionbroda

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────

      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Part 1 — Update existing products ──────────────────────────────────

      #- name: Read DB
      #  run: python3 fashionbroda_cj/fashionbroda_cj/scripts/read_db.py

      - name: Validate Fashionbroda Yupoo album URLs
        working-directory: fashionbroda/fashionbroda_cj
        run: scrapy crawl validate

      - name: Crawl existing albums
        working-directory: fashionbroda/fashionbroda_cj
        run: scrapy crawl fashionbroda

      - name: Generate slugs
        run: python3 fashionbroda_cj/fashionbroda_cj/scripts/slug.py

      - name: Download/verify images in R2
        run: python3 fashionbroda_cj/fashionbroda_cj/scripts/r2_img_download.py

      - name: Compare and update DB
        run: python3 fashionbroda_cj/fashionbroda_cj/scripts/compare_and_update.py

      # ── Part 2 — Discover and insert new products ───────────────────────────

      - name: Discover new albums
        working-directory: fashionbroda/fashionbroda_cj
        run: scrapy crawl discover

      - name: Check for new albums
        id: check_new_albums
        run: |
          python3 - << 'PYEOF'
          import json, os, sys
          path = "fashionbroda_cj/fashionbroda_cj/data/new_album_data.json"
          try:
              with open(path, "r") as f:
                  data = json.load(f)
              count = len(data) if isinstance(data, list) else len(data.values())
              print(f"Found {count} new albums")
              if count == 0:
                  print("new_albums=false")
                  # Write to GitHub Actions output so subsequent steps can check
                  with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                      out.write("new_albums=false\n")
              else:
                  with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                      out.write("new_albums=true\n")
          except FileNotFoundError:
              print("new_album_data.json not found — treating as no new albums")
              with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                  out.write("new_albums=false\n")
          PYEOF

      - name: Stop pipeline — no new albums found
        if: steps.check_new_albums.outputs.new_albums == 'false'
        run: |
          echo "No new albums discovered. Pipeline complete."
          exit 0

      - name: Download new album images to R2
        if: steps.check_new_albums.outputs.new_albums == 'true'
        run: python3 fashionbroda_cj/fashionbroda_cj/scripts/download_new_data.py

      - name: Insert new albums into DB
        if: steps.check_new_albums.outputs.new_albums == 'true'
        run: python3 fashionbroda_cj/fashionbroda_cj/scripts/supabase_upload_new_data.py

      # ── Notify on failure ───────────────────────────────────────────────────

      - name: Pipeline failed
        if: failure()
        run: |
          echo "Pipeline failed at step: ${{ github.job }}"
          echo "Check the logs above for details"
