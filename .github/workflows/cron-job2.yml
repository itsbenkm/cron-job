name: WTG Upload Images to R2

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run upload script
        run: python woodtableguy/wtg/wtg/scripts/upload_r2.py

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: album_data_updated_cdn
          path: woodtableguy/wtg/wtg/data/album_data_updated_cdn.json
          retention-days: 7